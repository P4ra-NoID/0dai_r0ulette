<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>おだいルーレット</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#33ccbb;
    color:black;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    height:100vh;
    padding-top:40px;
    box-sizing:border-box;
}

.screen{
    width:90%;
    max-width:400px;
}

.panel{
    background:white;
    border-radius:20px;
    padding:20px;
    box-sizing:border-box;
}

.titleBox{
    background:white;
    border-radius:16px;
    padding:14px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    margin-bottom:20px;
}

.notice{
    line-height:1.8;
    text-align:center;
}

button{
    background:#33ccbb;
    color:black;
    border:none;
    border-radius:14px;
    padding:12px 20px;
    font-size:18px;
    cursor:pointer;
    width:100%;
    max-width:220px;
}

button:disabled{
    opacity:0.7;
    cursor:default;
}

.center{
    text-align:center;
    margin-top:20px;
}

.slot-container{
    background:#fff4a8;
    border-radius:20px;
    padding:15px;
}

.slot{
    background:white;
    border-radius:15px;
    height:60px;
    overflow:hidden;
    margin-bottom:15px;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    font-weight:bold;
}

.slot:last-child{
    margin-bottom:0;
}

.hidden{
    display:none;
}

.soundToggle{
    position:fixed;
    top:15px;
    right:15px;
    background:rgba(255,255,255,0.6);
    backdrop-filter:blur(4px);
    padding:10px 14px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="soundToggle" id="soundBtn">
🔉
</div>

<div class="screen">

<!-- 独立タイトル -->
<div class="titleBox">
おだいルーレット
</div>

<!-- タイトル画面 -->
<div id="titleScreen" class="panel">

<div class="notice">
・結果はランダムです<br>
・みんな仲良く遊びましょう<br>
・音が流れます
</div>

<div class="center">
<button id="startBtn">はじめる</button>
</div>

</div>

<!-- ルーレット画面 -->
<div id="gameScreen" class="panel hidden">

<div class="slot-container">

<div class="slot" id="who">
？？？
</div>

<div class="slot" id="where">
？？？
</div>

<div class="slot" id="when">
？？？
</div>

<div class="slot" id="what">
？？？
</div>

</div>

<div class="center">
<button id="spinBtn">まわす</button>
</div>

</div>

</div>

<script>
const bgm = new Audio("https://raw.githubusercontent.com/P4ra-NoID/0dai_r0ulette/main/famipop3.mp3");
bgm.loop = true;
bgm.volume = 0.2;

const clickSound = new Audio("https://raw.githubusercontent.com/P4ra-NoID/0dai_r0ulette/main/click32.mp3");
clickSound.volume = 0.5;

let soundOn = true;

const whoList = [
    "変人ワンツーが",
    "天馬司が",
    "神代類が",
    "先生が",
    "アイドルが"
];

const whereList = [
    "学校で",
    "宇宙で",
    "海で",
    "屋上で",
    "コンビニで"
];

const whenList = [
    "授業中に",
    "夏休みに",
    "昨日",
    "放課後に",
    "朝5時に"
];

const whatList = [
    "踊った",
    "告白した",
    "爆発した",
    "犬に脅えて逃げた",
    "吹っ飛んだ"
];

const titleScreen = document.getElementById("titleScreen");
const gameScreen = document.getElementById("gameScreen");

const who = document.getElementById("who");
const where = document.getElementById("where");
const when = document.getElementById("when");
const what = document.getElementById("what");

function playClick(){
    if(soundOn){
        clickSound.currentTime = 0;
        clickSound.play();
    }
}

document.getElementById("startBtn").addEventListener("click", () => {

    playClick();

    titleScreen.classList.add("hidden");
    gameScreen.classList.remove("hidden");

    if(soundOn){
        bgm.play();
    }
});

document.getElementById("soundBtn").addEventListener("click", () => {

    soundOn = !soundOn;

    if(soundOn){
        document.getElementById("soundBtn").textContent = "🔉";
        bgm.play();
    }else{
        document.getElementById("soundBtn").textContent = "🔇";
        bgm.pause();
    }

    playClick();
});

function randomItem(list){
    return list[Math.floor(Math.random() * list.length)];
}

function spinSlot(element, list, duration, finalText){

    const interval = setInterval(() => {
        element.textContent = randomItem(list);
    }, 80);

    setTimeout(() => {
        clearInterval(interval);
        element.textContent = finalText;
    }, duration);
}

document.getElementById("spinBtn").addEventListener("click", () => {

    playClick();

    const spinBtn = document.getElementById("spinBtn");

    spinBtn.disabled = true;
    spinBtn.textContent = "…待ってね…";

    const finalWho = randomItem(whoList);
    const finalWhere = randomItem(whereList);
    const finalWhen = randomItem(whenList);
    const finalWhat = randomItem(whatList);

    spinSlot(who, whoList, 1000, finalWho);
    spinSlot(where, whereList, 1400, finalWhere);
    spinSlot(when, whenList, 1800, finalWhen);
    spinSlot(what, whatList, 2200, finalWhat);

    setTimeout(() => {

        spinBtn.disabled = false;
        spinBtn.textContent = "まわす";

    }, 2300);

});
</script>

</body>
</html>
