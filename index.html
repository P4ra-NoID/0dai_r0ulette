<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>おだいルーレット</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#33ccbb;
    color:black;
    position:relative;
    min-height:100vh;
}

.screen{
    width:90%;
    max-width:400px;

    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
}

.panel{
    background:white;
    border-radius:20px;
    padding:20px;
    box-sizing:border-box;
}

.titleBox{
    background:white;
    border-radius:16px;
    padding:14px;
    text-align:center;
    font-size:28px;
    font-weight:bold;

    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);

    width:80%;
    max-width:360px;

    z-index:10;
}

.notice{
    line-height:1.8;
    text-align:center;
}

button{
    background:#33ccbb;
    color:black;
    border:none;
    border-radius:14px;
    padding:12px 20px;
    font-size:18px;
    cursor:pointer;
    width:100%;
    max-width:220px;
}

button:disabled{
    opacity:0.7;
    cursor:default;
}

.center{
    text-align:center;
    margin-top:20px;
}

.slot-container{
    background:#fff4a8;
    border-radius:20px;
    padding:15px;
}

.slot{
    background:white;
    border-radius:15px;
    height:60px;
    overflow:hidden;
    margin-bottom:15px;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    font-weight:bold;
}

.slot:last-child{
    margin-bottom:0;
}

.hidden{
    display:none;
}

.soundToggle{
    position:fixed;
    top:15px;
    right:15px;
    background:rgba(255,255,255,0.6);
    backdrop-filter:blur(4px);
    padding:10px 14px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    z-index:20;
}

    .credit{
    margin-top:18px;
    text-align:center;
    font-size:13px;
    line-height:1.6;
}

.credit a{
    color:#EE1166;
    text-decoration:none;

    background:rgba(255,255,255,0.5);
    padding:2px 6px;
    border-radius:8px;
}
    
</style>
</head>

<body>

<div class="soundToggle" id="soundBtn">
🔉
</div>

<!-- タイトル -->
<div class="titleBox">
おだいルーレット
</div>

<div class="screen">

<!-- タイトル画面 -->
<div id="titleScreen" class="panel">

<div class="notice">
・男子4人がわちゃわちゃするだけです<br>
・絵の構想に行き詰まった際に参考にしてね<br>
・あくまで個人的に作成したものです。<br>
公式やその他サイトとは一切関係がないため、<br>
公式の場や公開された場所での言及はやめてください。<br>
・音が流れます<br>
・何かあれば下部Twitter垢まで
</div>

<div class="center">
<button id="startBtn">はじめる</button>
</div>

</div>

<!-- ルーレット画面 -->
<div id="gameScreen" class="panel hidden">

<div class="slot-container">

<div class="slot" id="who">
？？？
</div>

<div class="slot" id="when">
？？？
</div>

<div class="slot" id="where">
？？？
</div>

<div class="slot" id="what">
？？？
</div>

</div>

<div class="center">
<button id="spinBtn">まわす</button>
</div>

</div>

</div>

<div class="credit">
製作者:春もち【観葉植物】<br>

<a href="https://twitter.com/ech_oni3" target="_blank">
@Ech_oni3
</a>
</div>
    
<script>
const bgm = new Audio("https://raw.githubusercontent.com/P4ra-NoID/0dai_r0ulette/main/famipop3.mp3");
bgm.loop = true;
bgm.volume = 0.2;

const clickSound = new Audio("https://raw.githubusercontent.com/P4ra-NoID/0dai_r0ulette/main/click32.mp3");
clickSound.volume = 0.5;

let soundOn = true;

const whoList = [
    "変人ワンツーが",
    "天馬司が",
    "神代類が",
];

const whenList = [
    "朝に",
    "夏休みに",
    "昨日",
    "授業中に",
    "放課後に"

];

const whereList = [
    "学校で",
    "宇宙で",
    "海で",
    "屋上で",
    "ミスって",
    "ゲーセンに行って",
    "かなり勢いよく",
    "フェニランで",
    "公園で"
];

const whatList = [
    "宇宙まで飛んだ",
    "maimaiをプレイした",
    "CHUNITHMをプレイした",
    "勢いよく爆発した",
    "歌って踊った",
    "パンを食べた",
    "勢いよく吹き飛んだ",
    "めちゃくちゃ猫に懐かれた",
    "めちゃくちゃ犬に追いかけられた",
    "勢いよく爆発させた",
    "鳥におやつをとられた",
    "靴が脱げた",
    "ありえないほどぐるぐる回った",
    "わるだくみした"
];

const titleScreen = document.getElementById("titleScreen");
const gameScreen = document.getElementById("gameScreen");

const who = document.getElementById("who");
const when = document.getElementById("when");
const where = document.getElementById("where");
const what = document.getElementById("what");

function playClick(){
    if(soundOn){
        clickSound.currentTime = 0;
        clickSound.play();
    }
}

document.getElementById("startBtn").addEventListener("click", () => {

    playClick();

    titleScreen.classList.add("hidden");
    gameScreen.classList.remove("hidden");

    if(soundOn){
        bgm.play();
    }
});

document.getElementById("soundBtn").addEventListener("click", () => {

    soundOn = !soundOn;

    if(soundOn){
        document.getElementById("soundBtn").textContent = "🔉";
        bgm.play();
    }else{
        document.getElementById("soundBtn").textContent = "🔇";
        bgm.pause();
    }

    playClick();
});

function randomItem(list){
    return list[Math.floor(Math.random() * list.length)];
}

function spinSlot(element, list, duration, finalText){

    const interval = setInterval(() => {
        element.textContent = randomItem(list);
    }, 80);

    setTimeout(() => {
        clearInterval(interval);
        element.textContent = finalText;
    }, duration);
}

document.getElementById("spinBtn").addEventListener("click", () => {

    playClick();

    const spinBtn = document.getElementById("spinBtn");

    spinBtn.disabled = true;
    spinBtn.textContent = "…待ってね…";

    const finalWho = randomItem(whoList);
    const finalWhen = randomItem(whenList);
    const finalWhere = randomItem(whereList);
    const finalWhat = randomItem(whatList);

    spinSlot(who, whoList, 1000, finalWho);
    spinSlot(when, whenList, 1400, finalWhen);
    spinSlot(where, whereList, 1800, finalWhere);
    spinSlot(what, whatList, 2200, finalWhat);

    setTimeout(() => {

        spinBtn.disabled = false;
        spinBtn.textContent = "まわす";

    }, 2300);

});
</script>

</body>
</html>
